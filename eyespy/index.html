<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EYESPY // SIGNAL INTERCEPT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="/eyespy/faviconE.png">
<link rel="icon" type="image/png" sizes="16x16" href="/eyespy/faviconE.png">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Courier New", monospace;
  color: #ff3b3b;
  background:
    radial-gradient(circle at 20% 10%, rgba(120,0,0,0.35), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(80,0,0,0.35), transparent 50%),
    radial-gradient(circle at center, #140000 0%, #050000 70%, #000 100%);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.04) 0px,
    rgba(255,0,0,0.04) 1px,
    transparent 2px,
    transparent 4px
  );
}

.console-grid {
  min-height: 100vh;
  display: grid;
  grid-template-columns: repeat(3, auto);
  gap: 60px;
  align-items: center;
  justify-items: center;
}

.device {
  width: 260px;
  height: 360px;
  background: #000;
  border: 2px solid rgba(255,60,60,0.4);
  box-shadow:
    inset 0 0 40px rgba(255,0,0,0.15),
    0 0 25px rgba(120,0,0,0.35);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.panel {
  width: 100%;
  height: 100%;
  padding: 12px;
  border: 2px solid #3a0000;
  background: #050000;
  box-sizing: border-box;
  position: relative;
}

/* ===== SONAR ===== */
#sonarCanvas {
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #220000, #000);
  cursor: crosshair;
}

.sonar-stats {
  position: absolute;
  left: 14px;
  top: 10px;
  font-size: 11px;
  line-height: 1.35;
  color: #ff9a9a;
  pointer-events: none;
}

.wave-label {
  position: absolute;
  bottom: 6px;
  left: 14px;
  font-size: 11px;
  color: #ffe066;
}
/* ===== RADIO ===== */
.radio {
  justify-content: flex-start;
  padding: 16px;
}

.radio-display {
  font-size: 14px;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.dial-label {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
}

.radio input[type="range"] {
  width: 100%;
  appearance: none;
  height: 4px;
  background: rgba(255,60,60,0.25);
  outline: none;
  margin: 6px 0;
}

.radio input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 14px;
  height: 14px;
  background: #ff3b3b;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(255,0,0,0.9);
}

.hint-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  margin-bottom: 6px;
}

.hint {
  opacity: 0.35;
  transition: all 0.2s ease;
}

.hint.correct {
  opacity: 1;
  color: #ff9a9a;
  text-shadow: 0 0 6px rgba(255,0,0,0.7);
}

.freq-bar {
  width: 100%;
  height: 10px;
  background: #1a0000;
  border: 1px solid #3a0000;
  position: relative;
  margin-bottom: 10px;
}

.volume-bar {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(255,60,60,0.9),
    rgba(255,60,60,0.2)
  );
  width: 60%;
  opacity: 0.35;
  pointer-events: none;
  transition: width 0.15s ease, opacity 0.15s ease;
}

.radio-controls {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.radio-controls button {
  background: black;
  color: #ff3b3b;
  border: 1px solid #ff3b3b;
  padding: 6px 12px;
  cursor: pointer;
}

.radio-controls button:active {
  background: #ff3b3b;
  color: black;
}

/* ===== MONITOR ===== */
.monitor-screen {
  height: 140px;
  font-size: 13px;
  border: 2px solid #3a0000;
  padding: 10px;
  background: black;
  overflow: hidden;
  white-space: pre-line;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #ff6b6b;
}

.monitor-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.monitor-buttons button {
  background: black;
  color: #ff3b3b;
  border: 1px solid #ff3b3b;
  padding: 8px 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="console-grid">

  <!-- SONAR -->
  <div class="device">
    <div class="panel">
      <canvas id="sonarCanvas"></canvas>

      <div class="sonar-stats" id="sonarStats">
        GY: 0.0<br>
        FLUX: 0%<br>
        WEIRD IDX: 0%<br>
        NEURAL BIAS: 0<br>
        REALITY INTEGRITY: 100%<br>
        NOISE FLOOR: 0 LVL<br>
        ODD TIDE: LOW
      </div>

      <div class="wave-label">ANOMALY: SIGNAL FLUX</div>
    </div>
  </div>

  <!-- RADIO PUZZLE -->
  <div class="device radio">

    <div class="radio-display">
      SIGNAL <span id="freqValue">XXX.ZZZ</span>
    </div>

    <div class="hint-row">
      <span id="hintX" class="hint">[X LOCK]</span>
      <span id="hintY" class="hint">[Y LOCK]</span>
    </div>

    <div class="dial-label">COARSE (XXX)</div>
    <input type="range" id="dialX" min="0" max="999" step="1" value="0">

    <div class="dial-label">FINE (YYY)</div>
    <input type="range" id="dialY" min="0" max="999" step="1" value="0">

    <div class="freq-bar">
      <div class="volume-bar" id="volumeBar"></div>
    </div>

    <div class="radio-controls">
      <button id="radioMute">MUTE</button>
      <button id="volDown">-</button>
      <button id="volUp">+</button>
    </div>

    <audio id="radioAudio"></audio>
  </div>

  <!-- MONITOR -->
  <div class="device">
    <div class="panel">
      <div class="monitor-screen" id="monitorScreen">AWAITING INPUT...</div>
      <div class="monitor-buttons">
        <button data-key="1">1</button>
        <button data-key="2">2</button>
        <button data-key="3">3</button>
        <button data-key="4">4</button>
        <button data-key="5">5</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ===== SONAR ===== */
const canvas = document.getElementById("sonarCanvas");
const ctx = canvas.getContext("2d");
const statsEl = document.getElementById("sonarStats");

function resizeCanvas() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let angle = 0;
let waveformPhase = 0;
let blips = [];
let statTick = 0;
let statCache = {
  flux: 0,
  bias: 0,
  noise: 0
};
const hiddenBinary = "11111111";
  
function spawnBlip(cx, cy, radius) {
  const a = Math.random() * Math.PI * 2;
  const d = Math.random() * radius * 0.85;

  blips.push({
    x: cx + Math.cos(a) * d,
    y: cy + Math.sin(a) * d,
    life: 1,
    baseSize: Math.random() * 2 + 2,
    secret: Math.random() < 0.08,
    pingBoost: 0
  });
}

/* ===== GRID ===== */
function drawGrid(cx, cy, radius) {
  ctx.strokeStyle = "rgba(255,80,80,0.18)";
  ctx.lineWidth = 1;

  for (let i = 1; i <= 4; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, (radius / 4) * i, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.moveTo(cx - radius, cy);
  ctx.lineTo(cx + radius, cy);
  ctx.moveTo(cx, cy - radius);
  ctx.lineTo(cx, cy + radius);
  ctx.stroke();
}

/* ===== SWEEP ===== */
function drawSweep(cx, cy, radius) {
  const sweepWidth = 0.25;

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, "rgba(255,80,80,0.25)");
  grad.addColorStop(1, "rgba(255,80,80,0)");

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, radius, angle - sweepWidth, angle);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = "#ff3b3b";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
  ctx.stroke();
}

/* ===== WAVE ===== */
function drawWaveform(w, h) {
  const baseY = h - 28;

  ctx.strokeStyle = "#ff6b6b";
  ctx.lineWidth = 1.2;
  ctx.beginPath();

  for (let x = 0; x < w; x++) {
    const bitIndex = Math.floor((x + waveformPhase) / 40) % hiddenBinary.length;
    const bit = hiddenBinary[bitIndex] === "1" ? 1 : 0;

    const amp = bit ? 24 : 5;
    const y =
      baseY +
      Math.sin((x + waveformPhase) * 0.09) * amp
      Math.sin((x + waveformPhase) * 0) * 4; //set to 0 if it looks too ugly wompwomp

    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.stroke();
  waveformPhase += 0.75;
}

/* ===== STATS ===== */
function updateStats(radius) {
  statTick++;

  if (statTick % 45 === 0) {
    statCache.flux = Math.floor(Math.random() * 120);
    statCache.bias = Math.floor(Math.random() * 240);
    statCache.noise = Math.floor(Math.random() * 4);
  }

  const weird = Math.min(99, Math.floor(blips.length * 3));
  const integrity = Math.max(0, 100 - weird);

  statsEl.innerHTML =
    `GY: ${(radius / 80).toFixed(1)}<br>
     FLUX: ${statCache.flux}%<br>
     WEIRD IDX: ${weird}%<br>
     NEURAL BIAS: ${statCache.bias}<br>
     REALITY INTEGRITY: ${integrity}%<br>
     NOISE FLOOR: ${statCache.noise} LVL<br>
     ODD TIDE: ${weird > 40 ? "RISING" : "LOW"}`;
}

function drawSonar() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = Math.min(cx, cy) - 10;

  drawGrid(cx, cy, radius);
  drawSweep(cx, cy, radius);

  if (Math.random() < 0.035) {
    const d = Math.random()*radius*0.6 + radius*0.2;
    blips.push({
        x: cx+Math.cos(angle)*d,
        y: cy+Math.sin(angle)*d,
        life:1,
        baseSize: Math.random() * 2 + 2,
        secret: Math.random() < 0.08,
        pingBoost: 0
        
    });
  }

  blips.forEach(b => {
    const dx = b.x - cx;
    const dy = b.y - cy;
    const ang = Math.atan2(dy, dx);
    const diff = Math.abs(ang - angle);
    
    if (diff < 0.08) b.pingBoost = 1;
    
    ctx.fillStyle = b.secret
      ? `rgba(255,120,255,${b.life})`
      : `rgba(255,80,80,${b.life})`;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    
    b.pingBoost *= 0.85;
    b.life -= 0.008;
  });

  blips = blips.filter(b => b.life > 0);
  angle += 0.019;
  
  drawWaveform(canvas.width, canvas.height);
  updateStats(radius);
  requestAnimationFrame(drawSonar);
}
drawSonar();

/* ===== RADIO ===== */
const dialX = document.getElementById("dialX");
const dialY = document.getElementById("dialY");
const freqValue = document.getElementById("freqValue");
const radioAudio = document.getElementById("radioAudio");
const hintX = document.getElementById("hintX");
const hintY = document.getElementById("hintY");
const volumeBar = document.getElementById("volumeBar");
const muteBtn = document.getElementById("radioMute");

const stations = [
  { x:209, y:135, src:"/reporterslog/frequency1.mp3" },
  { x:401, y:675, src:"/reporterslog/frequency2.mp3" },
  { x:666, y:451, src:"/reporterslog/frequency3.mp3" },
  { x:777, y:777, src:"/reporterslog/frequency4.mp3" },
  { x:913, y:332, src:"/reporterslog/frequency4.mp3" }
];

radioAudio.loop = true;
radioAudio.volume = 0.6;

function updateDisplay() {
  const x = Number(dialX.value);
  const y = Number(dialY.value);
  freqValue.textContent = `${x}.${String(y).padStart(3,"0")}`;

  let matched = false;

  stations.forEach(st => {
    if (x === st.x) hintX.classList.add("correct");
    if (y === st.y) hintY.classList.add("correct");

    if (x === st.x && y === st.y) {
      radioAudio.src = st.src;
      radioAudio.play().catch(()=>{});
      matched = true;
    }
  });

  if (!stations.some(s => s.x === x)) hintX.classList.remove("correct");
  if (!stations.some(s => s.y === y)) hintY.classList.remove("correct");

  if (!matched) radioAudio.pause();
}

dialX.addEventListener("input", updateDisplay);
dialY.addEventListener("input", updateDisplay);
updateDisplay();

//volume stuff
function updateVolumeUI() {
  volumeBar.style.width = `${radioAudio.volume * 100}%`;
}
updateVolumeUI();

volUp.onclick = () => {
  radioAudio.volume = Math.min(1, radioAudio.volume + 0.1);
  updateVolumeUI();
};

volDown.onclick = () => {
  radioAudio.volume = Math.max(0, radioAudio.volume - 0.1);
  updateVolumeUI();
};

muteBtn.onclick = () => {
  radioAudio.muted = !radioAudio.muted;
  muteBtn.textContent = radioAudio.muted ? "UNMUTE" : "MUTE";
};

/* ===== MONITOR ===== */
const responses = {
  "13314": "Code number 1",
  "54541": "Code number 2",
  "11224": "Code number 3",
  "33421": "Code number 4"
};

const monitor = document.getElementById("monitorScreen");
const buttons = document.querySelectorAll(".monitor-buttons button");

let input = "";
let locked = false;
let resetTimer = null;

//could change to 4? maybe
const MAX_LEN = 5;

function resetMonitor() {
  input = "";
  locked = false;
  monitor.textContent = "AWAITING INPUT...";
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    if (locked) return;

    // if already at max length, reset before adding
    if (input.length >= MAX_LEN) {
      input = "";
    }

    input += btn.dataset.key;
    monitor.textContent = input;

    // checks the code
    if (responses[input]) {
      monitor.textContent = responses[input];
      locked = true;

      clearTimeout(resetTimer);
      resetTimer = setTimeout(resetMonitor, 10000);
    }
  });
});
</script>
</body>
</html>
