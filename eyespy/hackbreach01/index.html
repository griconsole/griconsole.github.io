<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>//SECURITY BREACH//</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== BASE ===== */
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: "Courier New", monospace;
  background:
    radial-gradient(circle at 50% 40%, #220000 0%, #050000 60%, #000 100%);
  color: #ff3b3b;
}

/* scanlines */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.05) 0px,
    rgba(255,0,0,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* ===== CAUTION BARS ===== */
.caution {
  position: fixed;
  left: 0;
  width: 100%;
  height: 40px;
  overflow: hidden;
  z-index: 10;
  background: #ffd000;
}

.caution::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    rgba(0,0,0,0.85) 0px,
    rgba(0,0,0,0.85) 16px,
    transparent 16px,
    transparent 32px
  );
  animation: cautionMove 1.2s linear infinite;
}

.caution.top { top: 0; }
.caution.bottom { bottom: 0; }

@keyframes cautionMove {
  from { transform: translateX(0); }
  to   { transform: translateX(64px); }
}

/* ===== CENTER ===== */
.center-wrap {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  padding-top: 50px;
  padding-bottom: 50px;
}

/* ===== PANEL ===== */
.panel {
  width: min(520px, 92vw);
  background: #050000;
  border: 2px solid #ff3b3b;
  box-shadow:
    inset 0 0 40px rgba(255,0,0,0.2),
    0 0 30px rgba(120,0,0,0.4);
  padding: 24px;
  text-align: center;
}

.title {
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 20px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  gap: 8px;
  margin-bottom: 18px;
}

.row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.tile {
  aspect-ratio: 1 / 1;
  border: 2px solid rgba(255,60,60,0.4);
  display: grid;
  place-items: center;
  font-size: 22px;
  font-weight: bold;
  background: #000;
  transition: all 0.18s ease;
}

/* states */
.tile.correct {
  background: #ff3b3b;
  color: #000;
  box-shadow: 0 0 10px rgba(255,0,0,0.9);
}

.tile.present {
  background: #ffd000;
  color: #000;
}

.tile.absent {
  background: #111;
  opacity: 0.4;
}

/* ===== KEYBOARD ===== */
.keyboard {
  display: grid;
  gap: 6px;
}

.keyrow {
  display: flex;
  justify-content: center;
  gap: 6px;
}

.key {
  padding: 8px 10px;
  border: 1px solid #ff3b3b;
  background: black;
  color: #ff3b3b;
  cursor: pointer;
  font-size: 12px;
  user-select: none;
}

.key:hover {
  box-shadow: 0 0 8px rgba(255,0,0,0.8);
}

.key.wide {
  padding: 8px 16px;
}

/* ===== STATUS ===== */
.status {
  height: 18px;
  font-size: 12px;
  margin-top: 10px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="caution top"></div>
<div class="caution bottom"></div>

<div class="center-wrap">
  <div class="panel">

    <div class="title">EYESPY BREACH</div>
    <div class="subtitle">BINARY AUTH REQUIRED</div>

    <div class="grid" id="grid"></div>

    <div class="keyboard" id="keyboard"></div>

    <div class="status" id="status"></div>

  </div>
</div>

<script>
/* ===== CONFIG ===== */
const WORD = "sight";
const MAX_ROWS = 6;
const WORD_LEN = 5;

/* ===== STATE ===== */
let row = 0;
let col = 0;
let board = Array.from({length: MAX_ROWS}, () => Array(WORD_LEN).fill(""));

const grid = document.getElementById("grid");
const statusEl = document.getElementById("status");

/* ===== BUILD GRID ===== */
for (let r = 0; r < MAX_ROWS; r++) {
  const rowEl = document.createElement("div");
  rowEl.className = "row";

  for (let c = 0; c < WORD_LEN; c++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    rowEl.appendChild(tile);
  }

  grid.appendChild(rowEl);
}

/* ===== KEYBOARD ===== */
const KEYS = [
  "QWERTYUIOP",
  "ASDFGHJKL",
  "ENTERZXCVBNMBACK"
];

const keyboard = document.getElementById("keyboard");

KEYS.forEach(line => {
  const rowEl = document.createElement("div");
  rowEl.className = "keyrow";

  if (line === "ENTERZXCVBNMBACK") {
    ["ENTER","Z","X","C","V","B","N","M","BACK"].forEach(k => {
      rowEl.appendChild(makeKey(k));
    });
  } else {
    line.split("").forEach(k => rowEl.appendChild(makeKey(k)));
  }

  keyboard.appendChild(rowEl);
});

function makeKey(label) {
  const k = document.createElement("div");
  k.className = "key";
  if (label === "ENTER" || label === "BACK") k.classList.add("wide");
  k.textContent = label;
  k.onclick = () => handleKey(label);
  return k;
}

/* ===== INPUT ===== */
document.addEventListener("keydown", e => {
  if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
  if (e.key === "Enter") handleKey("ENTER");
  if (e.key === "Backspace") handleKey("BACK");
});

function handleKey(key) {
  if (row >= MAX_ROWS) return;

  if (key === "BACK") {
    if (col > 0) {
      col--;
      board[row][col] = "";
      updateGrid();
    }
    return;
  }

  if (key === "ENTER") {
    if (col === WORD_LEN) submitGuess();
    return;
  }

  if (col < WORD_LEN && /^[A-Z]$/.test(key)) {
    board[row][col] = key;
    col++;
    updateGrid();
  }
}

/* ===== UPDATE GRID ===== */
function updateGrid() {
  const rows = document.querySelectorAll(".row");

  rows.forEach((rowEl, r) => {
    const tiles = rowEl.children;
    for (let c = 0; c < WORD_LEN; c++) {
      tiles[c].textContent = board[r][c];
    }
  });
}

/* ===== CHECK ===== */
function submitGuess() {
  const guess = board[row].join("").toLowerCase();
  if (guess.length < WORD_LEN) return;

  const tiles = grid.children[row].children;
  const target = WORD;

  let correctCount = 0;

  for (let i = 0; i < WORD_LEN; i++) {
    if (guess[i] === target[i]) {
      tiles[i].classList.add("correct");
      correctCount++;
    } else if (target.includes(guess[i])) {
      tiles[i].classList.add("present");
    } else {
      tiles[i].classList.add("absent");
    }
  }

  if (correctCount === WORD_LEN) {
    statusEl.textContent = "ACCESS GRANTED";
    row = MAX_ROWS;
    return;
  }

  row++;
  col = 0;

  if (row === MAX_ROWS) {
    statusEl.textContent = "ACCESS DENIED // WORD: " + WORD.toUpperCase();
  }
}
</script>

</body>
</html>
