<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∞</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    cursor:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#020205;
    font-family:'IBM Plex Mono', monospace;
    color:#e6e6ff;
    margin: 0;
    display: grid;
    place-items: center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 50% 50%, rgba(180,120,255,0.12), transparent 45%),
        radial-gradient(circle at 20% 30%, rgba(120,200,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,120,180,0.06), transparent 45%);
    pointer-events:none;
}

body::after{
    content:"";
    position:fixed;

    width: 180vmax;
    height: 180vmax;

    transform: translate(-50%, -50%);
    background: repeating-conic-gradient(
        from 0deg, rgba(255,255,255,0.02) 0deg 10deg, transparent 10deg 20deg
    );
    opacity:1;
    filter: blur(1px);
    animation:spin 18s linear infinite;
    pointer-events:none;
}

@keyframes spin{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

#cursor{
    position:fixed;
    width:12px;
    height:12px;
    border:1px solid rgba(230,230,255,0.7);
    border-radius:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
    z-index:9999;
}

#ring {
    width: min(60vmin, 520px);
    height: min(60vmin, 520px);
    position: relative;
    border-radius: 50%;
    border: 1px solid rgba(200,200,255,0.15);
    animation: spin 12s linear infinite reverse;
}

.node{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.6;
}

.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    max-width:700px;
}

.title{
    font-size:1.8rem;
    letter-spacing:0.35em;
    opacity:0;
    animation:fadeIn 3s forwards;
}

@keyframes fadeIn{
    to{opacity:1}
}

.subtitle{
    margin-top:20px;
    font-size:0.85rem;
    opacity:0;
    animation:fadeIn 4s forwards;
    animation-delay:1.5s;
    line-height:1.9;
    color:rgba(230,230,255,0.75);
}

.sigils{
    margin-top:30px;
    font-size:0.8rem;
    letter-spacing:0.25em;
    opacity:0.65;
}

.sigils span{
    display:inline-block;
    animation:glow 2.8s infinite;
}

.sigils span:nth-child(odd){animation-delay:0.4s}
.sigils span:nth-child(even){animation-delay:0.9s}

@keyframes glow{
    0%,100%{opacity:0.2}
    50%{opacity:1}
}

@keyframes flicker{
    0%,100%{opacity:1}
    50%{opacity:0.7}
}

</style>
</head>

<body>
<div id="cursor"></div>
<div id="ring"></div>

<div class="center">
    <div class="title">⟁  ∴  ⟡</div>
    <div class="subtitle">
        QUOD COMPLET NON CONCLUDIT
        <br><br>
        QUAE REDITUS NUMQUAM ABFUERUNT
        <br><br>
        CYCLU FABULARUM MEMORITUR
        <br>
        OMNES FABULAE PERPETUAE EST
    </div>

    <div class="sigils">
        <span>∴</span> <span>⟁</span> <span>∞</span> <span>⟡</span> <span>⟁</span> <span>∴</span>
    </div>
</div>

<script>
const cursor = document.getElementById("cursor");
const ring = document.getElementById("ring");

document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

for(let i=0;i<16;i++){
    const n=document.createElement("div");
    n.className="node";

    const angle=(i/16)*Math.PI*2;
    const r=180;

    const x=210+Math.cos(angle)*r;
    const y=210+Math.sin(angle)*r;

    n.style.left=x+"px";
    n.style.top=y+"px";

    ring.appendChild(n);
}

setInterval(()=>{
    document.body.style.filter = "hue-rotate("+(Math.random()*6-3)+"deg)";
},1200);

setTimeout(()=>{
    document.body.style.transition="opacity 3s";
    document.body.style.opacity=0;
},32000);

setTimeout(()=>{
    window.location.href = "/anomaly";
},34500);
</script>

</body>
</html>
