<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDGE ARCHIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: "Courier New", monospace;
  color: #00ffcc;
  background: radial-gradient(circle at center, #03141c, #000);
}

/* ===== BACKGROUND MOTION ===== */
body::before {
  content: "";
  position: fixed;
  inset: -50%;
  background:
    radial-gradient(circle, rgba(0,255,204,0.08) 1px, transparent 1px);
  background-size: 6px 6px;
  animation: moireMove 12s linear infinite;
  pointer-events: none;
}

@keyframes moireMove {
  from { transform: translate(0,0); }
  to { transform: translate(120px, 80px); }
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,255,204,0.15), transparent 300px);
  pointer-events: none;
}

/* ===== CENTRE ===== */
.center-wrap {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
}

/* ===== WHEEL ===== */
.wheel {
  position: relative;
  width: min(80vmin, 700px);
  height: min(80vmin, 700px);
  border-radius: 50%;
  border: 2px solid rgba(0,255,204,0.5);
  box-shadow:
    inset 0 0 40px rgba(0,255,204,0.2),
    0 0 30px rgba(0,255,204,0.2);
  animation: breathe 6s ease-in-out infinite;
  overflow: visible;
}

@keyframes breathe {
  0%   { transform: scale(1); filter: brightness(1); }
  50%  { transform: scale(1.015); filter: brightness(1.2); }
  100% { transform: scale(1); filter: brightness(1); }
}

.symbol {
  position: absolute;
  width: 44px;
  height: 44px;
  border: 1px solid rgba(0,255,204,0.6);
  display: grid;
  place-items: center;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  cursor: pointer;
  user-select: none;
  transform: translate(-50%, -50%);
  transition: all 0.15s ease;
  z-index: 5;
}

.symbol:hover {
  box-shadow: 0 0 12px rgba(0,255,204,0.9);
  background: rgba(0,40,40,0.8);
}

.symbol.sealed {
  border-color: white;
  color: white;
  opacity: 0.6;
  animation: sealedGlitch 0.9s infinite;
  filter: grayscale(1) brightness(1.2);
}

.symbol img {
  transition: transform 0.3s ease, filter 0.3s ease;
  filter: drop-shadow(0 0 4px rgba(0,255,204,0.6));
}

.symbol:hover img {
  transform: scale(1.1);
  filter: drop-shadow(0 0 12px rgba(0,255,204,1));
}

@keyframes sealedGlitch {
  0% { transform: translate(-50%, -50%) skew(0deg); opacity: 0.4; }
  20% { transform: translate(-51%, -49%) skew(1deg); }
  40% { transform: translate(-49%, -51%) skew(0deg); }
  60% { transform: translate(-51%, -49%) skew(0deg); }
  80% { transform: translate(-49%, -51%) skew(-1deg); }
  100% { transform: translate(-50%, -50%) skew(0deg); opacity: 0.9; }
}

/* ===== POPUP ===== */
.popup {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  background: rgba(0,0,0,0.7);
}

.popup.active {
  display: grid;
  animation: fadeIn 0.25s ease;
}

.popup-panel {
  width: min(900px, 92vw);
  height: min(500px, 80vh);
  background: #000;
  border: 2px solid #00ffcc;
  display: flex;
  flex-direction: column;
  animation: glitchIn 0.25s ease;
}

.popup-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 10px;
  padding: 12px;
}

.popup-image {
  border: 1px solid #00ffcc;
  display: flex;
  align-items: center;
  justify-content: center;
}

.popup-text {
  overflow: auto;
  font-size: 13px;
}

.popup-footer {
  border-top: 1px solid #00ffcc;
  padding: 8px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.popup-footer button {
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 5px 12px;
  cursor: pointer;
}

.popup-footer button:hover {
  box-shadow: 0 0 10px #00ffcc;
}

.popup-footer button.active {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 10px #00ffcc;
}

/* ===== OUTER SYSTEM ===== */
.wheel-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* outer circle */
.wheel-overlay::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 120%;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1px solid rgba(0,255,204,0.25);
  box-shadow: 0 0 40px rgba(0,255,204,0.1);
  animation: ringPulse 6s ease-in-out infinite;
}

@keyframes ringPulse {
  0%,100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.03); }
}

/* tubes n pubes*/
.tube {
  position: absolute;
  width: 2px;
  height: 40%;
  background: linear-gradient(to top, rgba(0,255,204,0.4), transparent);
  left: 50%;
  top: 50%;
  transform-origin: bottom center;
  opacity: 0.6;
}

.hud-panel {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 220px;
  font-family: monospace;
  font-size: 13px;
  color: rgba(0,255,204,0.8);
  pointer-events: none;
  line-height: 1.4;
}

.hud-panel.left { left: 20px; }
.hud-panel.right { right: 20px; text-align: right; }

.hud-line {
  opacity: 0.8;
  transition: opacity 0.2s;
}

.hud-line.glitch {
  color: #ff3b3b;
  opacity: 1;
  text-shadow: 0 0 6px red;
}

.hud-title {
  margin-top: 10px;
  color: rgba(0,255,204,0.5);
}

/* animations */
@keyframes fadeIn {
  from { opacity: 0 }
  to { opacity: 1 }
}

@keyframes glitchIn {
  0% { transform: scale(0.95) translateX(-10px); opacity:0 }
  50% { transform: scale(1.02) translateX(5px); opacity:1 }
  100% { transform: scale(1) translateX(0) }
}
</style>
</head>

<body>

<div class="center-wrap">
  <div id="hud-right" class="hud-panel right"></div>
  <div class="wheel" id="wheel"></div>
  <div id="hud-left" class="hud-panel left"></div>
</div>

<div class="popup" id="popup">
  <div class="popup-panel">
    <div class="popup-content">
      <div class="popup-image" id="popupImage">REALM IMAGE</div>
      <div class="popup-text" id="popupText"></div>
    </div>
    <div class="popup-footer">
      <button onclick="setTab('info')">INFO</button>
      <button onclick="setTab('habitat')">HABITAT</button>
      <button onclick="setTab('dangers')">DANGERS</button>
      <button onclick="closePopup()">CLOSE</button>
    </div>
  </div>
</div>

<script>
/* ===== CURSOR LIGHT ===== */
document.addEventListener("mousemove", e=>{
  document.body.style.setProperty("--mx", e.clientX+"px");
  document.body.style.setProperty("--my", e.clientY+"px");
});

/* ===== DATA ===== */
const realms = [
{
  name: "SLEIGHT",
  sealed: false,
  info: "A world where two rival agent factions wage a intelligence war. Every inhabitant possesses a unique ability; Dangerous, and often reality-bending.",
  habitat: "Urban environments resembling modern Earth cities, normal civilians, and surveillance everywhere.",
  dangers: "Highly trained agents with unique powers, manipulation, and constant infiltration.",
  image: "/realms/sleight.png",
  symbol: "/symbols/sleight.png"
},
{
  name: "FLOAT",
  sealed: false,
  info: "A pan-dimensional organism system composed of multiple 'realms' acting as organs. Each realm represents a function: digestion, time regulation, immunity, and more, feeding on the multiverse itself.",
  habitat: "Shifting biological dimensions, each with unique physical laws tied to its 'organ' function.",
  dangers: "Reality digestion, immune responses attacking intruders, time distortion, and systemic collapse reactions.",
  image: "/realms/float.png",
  symbol: "/symbols/float.png"
},
{
  name: "VINTERLAND",
  sealed: true,
  info: "A frozen realm under eternal snowfall and a permanent full moon. St. Nicholas gifts cursed offerings that transform recipients into monstrous servants.",
  habitat: "Dark snowy forests, frozen villages, and paths made by the inhabitants.",
  dangers: "Transformation curses, monstrous entities, and lunar influence. Entry into this realm is highly suggested to be made with several sources of heat.",
  image: "/realms/vinter.png",
  symbol: "/symbols/vinter.png"
},
{
  name: "IMP.CO",
  sealed: false,
  info: "A corporate hellscape where demons, devils, and mythological evils operate under strict bureaucratic systems. Torture and paperwork go hand-in-hand.",
  habitat: "Infinite office complexes, HR departments, cubicles, and infernal corporate structures.",
  dangers: "Endless contracts, hierarchical torment, demonic management, and eternal employment.",
  image: "/realms/impco.png",
  symbol: "/symbols/impco.png"
},
{
  name: "STELLWEST",
  sealed: false,
  info: "A mechanical wild west where humans have long perished. Robots roam the scorching deserts, armed to the teeth and bound by old-world dueling codes.",
  habitat: "Deserts, metal towns, rusted saloons, and railways under a blazing sun.",
  dangers: "Armed constructs, overheating environments, and relentless duels.",
  image: "/realms/stellwest.png",
  symbol: "/symbols/stellwest.png"
},
{
  name: "CORCEA",
  sealed: false,
  info: "A divine realm governed by three entities: Aldwyn (fire and renewal), Bodwyn (ice and death), and Corcea itself, the living land. Worship defines existence here.",
  habitat: "Volcanic lands, frozen tundras, and living terrain that responds to devotion.",
  dangers: "Divine wrath, environmental extremes, and unpredictable living ground.",
  image: "/realms/corcea.png",
  symbol: "/symbols/corcea.png"
},
{
  name: "TWINSINTIME",
  sealed: false,
  info: "Two twins were separated across time after interacting with a chronomantic artifact. Their existence echoes through fractured timelines.",
  habitat: "Temporal rifts, overlapping timelines, and unstable chronological zones.",
  dangers: "Time paradoxes, erasure, duplication, and temporal isolation.",
  image: "/realms/tit.png",
  symbol: "/symbols/tit.png"
},
{
  name: "UTOPIOSPHERE",
  sealed: false,
  info: "A divine creation formed by a peaceful goddess. A spiraling disc world where gravity fluctuates and islands drift with oceanic tides.",
  habitat: "Floating islands, spiral continents, and oceanic voids influenced by gravity shifts.",
  dangers: "Gravitational anomalies, falling landmasses, and unknown divine interventions.",
  image: "/realms/utopio.png",
  symbol: "/symbols/utopio.png"
},
{
  name: "PROPHECY",
  sealed: false,
  info: "A world where magic is drawn into existence. Runes, symbols, and shapes act as programming language for reality.",
  habitat: "Fantasy landscapes filled with rune circles, magical academies, and artistic battlegrounds.",
  dangers: "Weaponized magic drawings, unstable spells, and rune-based warfare.",
  image: "/realms/prop.png",
  symbol: "/symbols/prop.png"
},
{
  name: "HEXCORE",
  sealed: false,
  info: "A geometric dimension ???.",
  habitat: "???.",
  dangers: "???.",
  image: "/realms/hex.png",
  symbol: "/symbols/hex.png"
},
{
  name: "SWEETVOID",
  sealed: false,
  info: "A deceptively cheerful candy-themed world ???.",
  habitat: "???.",
  dangers: "???.",
  image: "/realms/sweet.png",
  symbol: "/symbols/sweet.png"
},
{
  name: "IDEAS",
  sealed: false,
  info: "Oh? You want to know more about us... come right in, we'd love to welcome you to a tea party.",
  habitat: "Just the best there is, wondeful air, an aromic environment... tons of flowers... are you allergic? Oh then, no flowers!",
  dangers: "None! Why would there be any...",
  image: "/realms/idea.png",
  symbol: "/symbols/idea.png"
},
{
  name: "FREAKADEMY",
  sealed: false,
  info: "A mythological academy housing creatures from every culture. Students train to unlock their Bloodline Abilities.",
  habitat: "Ancient Greek-inspired campuses filled with supernatural beings.",
  dangers: "Uncontrolled powers, rivalries, and mythological conflicts. Otherwise the students and teachers seem to be peaceful towards humanoids",
  image: "/realms/freak.png",
  symbol: "/symbols/freak.png"
},
{
  name: "BLOODEYE",
  sealed: false,
  info: "A crimson wasteland ruled by the Queen of Crimson, progenitor of all Shifters. Everything exists to serve her.",
  habitat: "Dead forests, red oceans, ash-filled skies.",
  dangers: "Shapeshifters, resource depletion, and the Queen herself.",
  image: "/realms/eye.png",
  symbol: "/symbols/eye.png"
},
{
  name: "DEEPDARK",
  sealed: false,
  info: "An oceanic abyss stretching into space. The deeper you go, the less reality behaves correctly.",
  habitat: "Endless ocean layers, bioluminescent depths, and orbital waters.",
  dangers: "Massive sea entities, pressure anomalies, and the Manowar.",
  image: "/realms/ddark.png",
  symbol: "/symbols/ddark.png"
},
{
  name: "CHRONOCLIFFS",
  sealed: false,
  info: "A reality warped by a multiversal reset. Familiar rules remain, but details have shifted, centered around a mysterious Clock Tower.",
  habitat: "Forests, cliffs, and anomaly-heavy zones around the tower.",
  dangers: "Reality inconsistencies, anomaly events, and experimental wormhole tech.",
  image: "/realms/chrono.png",
  symbol: "/symbols/chrono.png"
}
];

let currentRealm = null;

const wheel = document.getElementById("wheel");

function buildWheel() {
  wheel.innerHTML = "";

  const size = wheel.clientWidth;
  const center = size / 2;
  const radius = size * 0.4;

  /* ===== SYMBOLS ===== */
  for (let i = 0; i < 16; i++) {
    const angle = 0.194 + (i / 16) * Math.PI * 2 - Math.PI / 2;

    const x = center + Math.cos(angle) * radius;
    const y = center + Math.sin(angle) * radius;

    const sym = document.createElement("div");
    sym.className = "symbol";

    const img = document.createElement("img");
    img.src = realms[i].symbol;
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "contain";
    img.draggable = false;

    sym.appendChild(img);

    if (realms[i].sealed) sym.classList.add("sealed");

    sym.style.left = x + "px";
    sym.style.top = y + "px";

    sym.onclick = () => openRealm(i);
    
    sym.onmouseenter = () => {
       stats.WEIRD += 0.12;
       stats.FLUX += 0.05;
       anomaly = "LOCAL DISTORTION";
    };

    wheel.appendChild(sym);
  }

  /* ===== OVERLAY (OUTER RING) ===== */
  const overlay = document.createElement("div");
  overlay.className = "wheel-overlay";
  wheel.appendChild(overlay);

  /* ===== TUBES ===== */
  for (let i = 0; i < 8; i++) {
    const t = document.createElement("div");
    t.className = "tube";

    const angle = (i / 8) * 360;
    t.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;

    wheel.appendChild(t);
  }
}

/* ===== INIT ===== */
buildWheel();

/* ===== EVENTS ===== */
window.addEventListener("resize", buildWheel);

document.addEventListener("fullscreenchange", () => {
  setTimeout(buildWheel, 50);
});

const leftPanel = document.getElementById("hud-left");
const rightPanel = document.getElementById("hud-right");

/* ===== BASE DATA ===== */
let stats = {
  GY: 1.3,
  FLUX: 101,
  WEIRD: 15,
  NEURAL: 47,
  INTEGRITY: 85,
  NOISE: 1,
  TIDE: "LOW"
};

let coords = {
  X: 502.1636,
  Y: -631.7432,
  Z: 78.1369,
  P: "63.83.13.96.32"
};

let anomaly = "SIGNAL FLUX";

/* ===== RENDER ===== */
function renderHUD() {
  leftPanel.innerHTML = `
    <div class="hud-line">GY: ${stats.GY.toFixed(2)}</div>
    <div class="hud-line">FLUX: ${stats.FLUX.toFixed(0)}%</div>
    <div class="hud-line">WEIRD IDX: ${stats.WEIRD.toFixed(0)}%</div>
    <div class="hud-line">NEURAL BIAS: ${stats.NEURAL}</div>
    <div class="hud-line">REALITY INTEGRITY: ${stats.INTEGRITY.toFixed(0)}%</div>
    <div class="hud-line">NOISE FLOOR: ${stats.NOISE} LVL</div>
    <div class="hud-line">ODD TIDE: ${stats.TIDE}</div>
  `;

  rightPanel.innerHTML = `
    <div class="hud-title">WEIRD LEVEL: GHX-Z½</div>
    <div class="hud-line">X: ${coords.X.toFixed(7)}</div>
    <div class="hud-line">Y: ${coords.Y.toFixed(7)}</div>
    <div class="hud-line">Z: ${coords.Z.toFixed(7)}</div>
    <div class="hud-line">P: ${coords.P}</div>

    <div class="hud-title">ANOMALY:</div>
    <div class="hud-line">${anomaly}</div>
  `;
}

/* ===== LIVE DRIFT ===== */
function tickHUD() {
  stats.GY += (Math.random() - 0.5) * 0.02;
  stats.FLUX += (Math.random() - 0.5) * 2;
  stats.WEIRD += (Math.random() - 0.5) * 1.5;
  stats.NEURAL += Math.floor((Math.random() - 0.5) * 2);
  stats.INTEGRITY += (Math.random() - 0.5) * 0.5;

  coords.X += (Math.random() - 0.5) * 0.01;
  coords.Y += (Math.random() - 0.5) * 0.01;
  coords.Z += (Math.random() - 0.5) * 0.01;

  /* clamp some values */
  stats.INTEGRITY = Math.max(0, Math.min(100, stats.INTEGRITY));
  stats.FLUX = Math.max(0, stats.FLUX);

  renderHUD();
}

/* ===== GLITCH EVENTS ===== */
function glitchHUD() {
  const lines = document.querySelectorAll(".hud-line");
  if (!lines.length) return;

  const target = lines[Math.floor(Math.random() * lines.length)];
  target.classList.add("glitch");

  setTimeout(() => {
    target.classList.remove("glitch");
  }, 200);
}

/* ===== ANOMALY ESCALATION ===== */
function escalateAnomaly() {
  const anomalies = [
    "SIGNAL FLUX",
    "PHASE BLEED",
    "TEMPORAL DUPLICATION",
    "NULL PRESENCE",
    "RECURSIVE OBSERVER",
    "∞ FEEDBACK LOOP"
  ];

  anomaly = anomalies[Math.floor(Math.random() * anomalies.length)];
}

/* ===== LOOP ===== */
setInterval(tickHUD, 300);
setInterval(glitchHUD, 800);
setInterval(escalateAnomaly, 4000);

/* ===== INIT ===== */
renderHUD();

/* ===== POPUP ===== */
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const popupImage = document.getElementById("popupImage");

function openRealm(i){
  currentRealm = realms[i];

  /* ===== IMAGE big one ===== */
  popupImage.innerHTML = "";
  const img = document.createElement("img");
  img.src = currentRealm.image;
  img.style.width = "100%";
  img.style.height = "100%";
  img.style.objectFit = "cover";

  popupImage.appendChild(img);

  setTab("info");
  popup.classList.add("active");
}

function setTab(type){
  if(!currentRealm) return;

  let label = "";

  if(type === "info") label = "INFO";
  if(type === "habitat") label = "HABITAT";
  if(type === "dangers") label = "DANGERS";

  popupText.innerHTML =
    "<b>" + currentRealm.name + "</b><br>" +
    "<span style='color:#00ffcc'>" + label + ":</span><br><br>" +
    currentRealm[type];

  if(currentRealm.sealed){
    popupText.innerHTML += "<br><br><span style='color:white'>- RIFT SEALED -</span>";
  }
  
  document.querySelectorAll(".popup-footer button").forEach(btn=>{
    btn.classList.remove("active");
  });

  const index = {info:0, habitat:1, dangers:2}[type];
  document.querySelectorAll(".popup-footer button")[index].classList.add("active");
}

function closePopup(){
  popup.classList.remove("active");
}
</script>

</body>
</html>
