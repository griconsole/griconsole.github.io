<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDGE ARCHIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: "Courier New", monospace;
  color: #00ffcc;
  background: radial-gradient(circle at center, #03141c, #000);
}

/* ===== BACKGROUND MOTION ===== */
body::before {
  content: "";
  position: fixed;
  inset: -50%;
  background:
    radial-gradient(circle, rgba(0,255,204,0.08) 1px, transparent 1px);
  background-size: 6px 6px;
  animation: moireMove 12s linear infinite;
  pointer-events: none;
}

@keyframes moireMove {
  from { transform: translate(0,0); }
  to { transform: translate(120px, 80px); }
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,255,204,0.15), transparent 300px);
  pointer-events: none;
}

/* ===== CENTRE ===== */
.center-wrap {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
}

/* ===== WHEEL ===== */
.wheel {
  position: relative;
  width: min(80vmin, 700px);
  height: min(80vmin, 700px);
  border-radius: 50%;
  border: 2px solid rgba(0,255,204,0.5);
  box-shadow:
    inset 0 0 40px rgba(0,255,204,0.2),
    0 0 30px rgba(0,255,204,0.2);
}

.symbol {
  position: absolute;
  width: 44px;
  height: 44px;
  border: 1px solid rgba(0,255,204,0.6);
  display: grid;
  place-items: center;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  cursor: pointer;
  user-select: none;
  transform: translate(-50%, -50%);
  transition: all 0.15s ease;
  z-index: 5;
}

.symbol:hover {
  box-shadow: 0 0 12px rgba(0,255,204,0.9);
  background: rgba(0,40,40,0.8);
}

.symbol.sealed {
  border-color: white;
  color: white;
  opacity: 0.6;
  animation: sealedGlitch 0.9s infinite;
  filter: grayscale(1) brightness(1.2);
}

.symbol img {
  transition: transform 0.3s ease, filter 0.3s ease;
  filter: drop-shadow(0 0 4px rgba(0,255,204,0.6));
}

.symbol:hover img {
  transform: scale(1.1);
  filter: drop-shadow(0 0 12px rgba(0,255,204,1));
}

@keyframes sealedGlitch {
  0% { transform: translate(-50%, -50%) skew(0deg); opacity: 0.4; }
  20% { transform: translate(-51%, -49%) skew(1deg); }
  40% { transform: translate(-49%, -51%) skew(0deg); }
  60% { transform: translate(-51%, -49%) skew(0deg); }
  80% { transform: translate(-49%, -51%) skew(-1deg); }
  100% { transform: translate(-50%, -50%) skew(0deg); opacity: 0.9; }
}

/* ===== POPUP ===== */
.popup {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  background: rgba(0,0,0,0.7);
}

.popup.active {
  display: grid;
  animation: fadeIn 0.25s ease;
}

.popup-panel {
  width: min(900px, 92vw);
  height: min(500px, 80vh);
  background: #000;
  border: 2px solid #00ffcc;
  display: flex;
  flex-direction: column;
  animation: glitchIn 0.25s ease;
}

.popup-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 10px;
  padding: 12px;
}

.popup-image {
  border: 1px solid #00ffcc;
  display: flex;
  align-items: center;
  justify-content: center;
}

.popup-text {
  overflow: auto;
  font-size: 13px;
}

.popup-footer {
  border-top: 1px solid #00ffcc;
  padding: 8px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.popup-footer button {
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 5px 12px;
  cursor: pointer;
}

.popup-footer button:hover {
  box-shadow: 0 0 10px #00ffcc;
}

.popup-footer button.active {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 10px #00ffcc;
}

/* animations */
@keyframes fadeIn {
  from { opacity: 0 }
  to { opacity: 1 }
}

@keyframes glitchIn {
  0% { transform: scale(0.95) translateX(-10px); opacity:0 }
  50% { transform: scale(1.02) translateX(5px); opacity:1 }
  100% { transform: scale(1) translateX(0) }
}
</style>
</head>

<body>

<div class="center-wrap">
  <div class="wheel" id="wheel"></div>
</div>

<div class="popup" id="popup">
  <div class="popup-panel">
    <div class="popup-content">
      <div class="popup-image" id="popupImage">REALM IMAGE</div>
      <div class="popup-text" id="popupText"></div>
    </div>
    <div class="popup-footer">
      <button onclick="setTab('info')">INFO</button>
      <button onclick="setTab('habitat')">HABITAT</button>
      <button onclick="setTab('dangers')">DANGERS</button>
      <button onclick="closePopup()">CLOSE</button>
    </div>
  </div>
</div>

<script>
/* ===== CURSOR LIGHT ===== */
document.addEventListener("mousemove", e=>{
  document.body.style.setProperty("--mx", e.clientX+"px");
  document.body.style.setProperty("--my", e.clientY+"px");
});

/* ===== DATA ===== */

},
{
  name: "STELLWEST",
  sealed: false,
  info: "A mechanical wild west where humans have long perished. Robots roam the scorching deserts, armed to the teeth and bound by old-world dueling codes.",
  habitat: "Deserts, metal towns, rusted saloons, and railways under a blazing sun.",
  dangers: "Armed constructs, overheating environments, and relentless duels.",
  image: "realms/stellwest.png",
  symbol: "symbols/stellwest.png"
},
{
  name: "CORCEA",
  sealed: false,
  info: "A divine realm governed by three entities: Aldwyn (fire and renewal), Bodwyn (ice and death), and Corcea itself, the living land. Worship defines existence here.",
  habitat: "Volcanic lands, frozen tundras, and living terrain that responds to devotion.",
  dangers: "Divine wrath, environmental extremes, and unpredictable living ground.",
  image: "realms/corcea.png",
  symbol: "symbols/corcea.png"
},
{
  name: "TWINSINTIME",
  sealed: false,
  info: "Two twins were separated across time after interacting with a chronomantic artifact. Their existence echoes through fractured timelines.",
  habitat: "Temporal rifts, overlapping timelines, and unstable chronological zones.",

{

},
{

  sealed: false,
  info: "A deceptively cheerful candy-themed world ???.",
  habitat: "???.",
  dangers: "???.",

  symbol: "symbols/sweet.png"
},
{
  name: "IDEAS",
  sealed: false,
  info: "Oh? You want to know more about us... come right in, we'd love to welcome you to a tea party.",

  habitat: "Ancient Greek-inspired campuses filled with supernatural beings.",

},
{

  sealed: false,
  info: "An oceanic abyss stretching into space. The deeper you go, the less reality behaves correctly.",
  habitat: "Endless ocean layers, bioluminescent depths, and orbital waters.",
  dangers: "Massive sea entities, pressure anomalies, and the Manowar.",
  image: "realms/ddark.png",
  symbol: "symbols/ddark.png"
},
{
  name: "CHRONOCLIFFS",
  sealed: false,
  info: "A reality warped by a multiversal reset. Familiar rules remain, but details have shifted, centered around a mysterious Clock Tower.",
  habitat: "Forests, cliffs, and anomaly-heavy zones around the tower.",
  dangers: "Reality inconsistencies, anomaly events, and experimental wormhole tech.",

let currentRealm = null;

const wheel = document.getElementById("wheel");

function buildWheel() {
  wheel.innerHTML = "";

  const size = wheel.clientWidth;
  const center = size / 2;
  const radius = size * 0.4;

  for (let i = 0; i < 16; i++) {
    const angle = 0.194 + (i / 16) * Math.PI * 2 - Math.PI/2;

    const x = center + Math.cos(angle) * radius;
    const y = center + Math.sin(angle) * radius;

    const sym = document.createElement("div");
    sym.className = "symbol";

    /* ===== IMAGE symbol ===== */
    const img = document.createElement("img");
    img.src = realms[i].symbol;
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "contain";
    img.draggable = false;

    sym.appendChild(img);

    if (realms[i].sealed) sym.classList.add("sealed");

    sym.style.left = x + "px";
    sym.style.top = y + "px";

    sym.onclick = () => openRealm(i);

    wheel.appendChild(sym);
  }
}

buildWheel();
window.addEventListener("resize", buildWheel);

/* ===== POPUP ===== */
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const popupImage = document.getElementById("popupImage");

function openRealm(i){
  currentRealm = realms[i];

  /* ===== IMAGE big one ===== */
  popupImage.innerHTML = "";
  const img = document.createElement("img");
  img.src = currentRealm.image;
  img.style.width = "100%";
  img.style.height = "100%";
  img.style.objectFit = "cover";

  popupImage.appendChild(img);

  setTab("info");
  popup.classList.add("active");
}

function setTab(type){
  if(!currentRealm) return;

  let label = "";

  if(type === "info") label = "INFO";
  if(type === "habitat") label = "HABITAT";
  if(type === "dangers") label = "DANGERS";

  popupText.innerHTML =
    "<b>" + currentRealm.name + "</b><br>" +
    "<span style='color:#00ffcc'>" + label + ":</span><br><br>" +
    currentRealm[type];

  if(currentRealm.sealed){
    popupText.innerHTML += "<br><br><span style='color:white'>- RIFT SEALED -</span>";
  }
  
  document.querySelectorAll(".popup-footer button").forEach(btn=>{
    btn.classList.remove("active");
  });

  const index = {info:0, habitat:1, dangers:2}[type];
  document.querySelectorAll(".popup-footer button")[index].classList.add("active");
}

function closePopup(){
  popup.classList.remove("active");
}
</script>

</body>
</html>
