<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDGE ARCHIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: "Courier New", monospace;
  color: #00ffcc;
  background: radial-gradient(circle at center, #03141c, #000);
}

/* ===== BACKGROUND MOTION ===== */
body::before {
  content: "";
  position: fixed;
  inset: -50%;
  background:
    radial-gradient(circle, rgba(0,255,204,0.08) 1px, transparent 1px);
  background-size: 6px 6px;
  animation: moireMove 12s linear infinite;
  pointer-events: none;
}

@keyframes moireMove {
  from { transform: translate(0,0); }
  to { transform: translate(120px, 80px); }
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,255,204,0.15), transparent 300px);
  pointer-events: none;
}

/* ===== CENTER ===== */
.center-wrap {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
}

/* ===== WHEEL ===== */
.wheel {
  position: relative;
  width: min(80vmin, 700px);
  height: min(80vmin, 700px);
  border-radius: 50%;
  border: 2px solid rgba(0,255,204,0.5);
  box-shadow:
    inset 0 0 40px rgba(0,255,204,0.2),
    0 0 30px rgba(0,255,204,0.2);
}

.symbol {
  position: absolute;
  width: 44px;
  height: 44px;
  border: 1px solid rgba(0,255,204,0.6);
  display: grid;
  place-items: center;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  cursor: pointer;
  user-select: none;
  transform: translate(-50%, -50%);
  transition: all 0.15s ease;
  z-index: 5;
}

.symbol:hover {
  box-shadow: 0 0 12px rgba(0,255,204,0.9);
  background: rgba(0,40,40,0.8);
}

.symbol.sealed {
  border-color: red;
  color: red;
  opacity: 0.6;
}

/* ===== POPUP ===== */
.popup {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  background: rgba(0,0,0,0.7);
}

.popup.active {
  display: grid;
  animation: fadeIn 0.25s ease;
}

.popup-panel {
  width: min(900px, 92vw);
  height: min(500px, 80vh);
  background: #000;
  border: 2px solid #00ffcc;
  display: flex;
  flex-direction: column;
  animation: glitchIn 0.25s ease;
}

.popup-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 10px;
  padding: 12px;
}

.popup-image {
  border: 1px solid #00ffcc;
  display: flex;
  align-items: center;
  justify-content: center;
}

.popup-text {
  overflow: auto;
  font-size: 13px;
}

.popup-footer {
  border-top: 1px solid #00ffcc;
  padding: 8px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.popup-footer button {
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 5px 12px;
  cursor: pointer;
}

.popup-footer button:hover {
  box-shadow: 0 0 10px #00ffcc;
}

/* animations */
@keyframes fadeIn {
  from { opacity: 0 }
  to { opacity: 1 }
}

@keyframes glitchIn {
  0% { transform: scale(0.95) translateX(-10px); opacity:0 }
  50% { transform: scale(1.02) translateX(5px); opacity:1 }
  100% { transform: scale(1) translateX(0) }
}
</style>
</head>

<body>

<div class="center-wrap">
  <div class="wheel" id="wheel"></div>
</div>

<div class="popup" id="popup">
  <div class="popup-panel">
    <div class="popup-content">
      <div class="popup-image" id="popupImage">REALM IMAGE</div>
      <div class="popup-text" id="popupText"></div>
    </div>
    <div class="popup-footer">
      <button onclick="setTab('info')">INFO</button>
      <button onclick="setTab('habitat')">HABITAT</button>
      <button onclick="setTab('dangers')">DANGERS</button>
      <button onclick="closePopup()">CLOSE</button>
    </div>
  </div>
</div>

<script>
/* ===== CURSOR LIGHT ===== */
document.addEventListener("mousemove", e=>{
  document.body.style.setProperty("--mx", e.clientX+"px");
  document.body.style.setProperty("--my", e.clientY+"px");
});

/* ===== DATA ===== */
const realms = Array.from({ length: 16 }).map((_, i) => ({
  name: "EDGE REALM " + (i + 1),
  sealed: false,
  info: "just a biiiig tit.",
  habitat: "land full o big o tits.",
  dangers: "tits everywhere.",
  image: ""
}));

let currentRealm = null;

/* ===== BUILD WHEEL ===== */
const wheel = document.getElementById("wheel");

function buildWheel() {
  wheel.innerHTML = "";

  const size = wheel.clientWidth;
  const center = size / 2;
  const radius = size * 0.4;

  for (let i = 0; i < 16; i++) {
    const angle = 0.194 + (i / 16) * Math.PI * 2 - Math.PI/2;
    
    //const angle = (i * 22.5) * Math.PI / 180;

    const x = center + Math.cos(angle) * radius;
    const y = center + Math.sin(angle) * radius;

    const sym = document.createElement("div");
    sym.className = "symbol";
    sym.textContent = i + 1;

    if (realms[i].sealed) sym.classList.add("sealed");

    sym.style.left = x + "px";
    sym.style.top = y + "px";

    sym.onclick = () => openRealm(i);

    wheel.appendChild(sym);
  }
}

buildWheel();
window.addEventListener("resize", buildWheel);

/* ===== POPUP ===== */
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const popupImage = document.getElementById("popupImage");

function openRealm(i){
  currentRealm = realms[i];
  setTab("info");
  popup.classList.add("active");
}

function setTab(type){
  if(!currentRealm) return;

  popupText.innerHTML =
    "<b>" + currentRealm.name + "</b><br><br>" +
    currentRealm[type];

  if(currentRealm.sealed){
    popupText.innerHTML += "<br><br><span style='color:red'>RIFT SEALED</span>";
  }
}

function closePopup(){
  popup.classList.remove("active");
}
</script>

</body>
</html>
