<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
<title>Weird-of-Fortune</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --primary: #00ffcc;
    --primary-dim: rgba(0,255,204,0.18);
    --primary-soft: rgba(0,255,204,0.08);
    --dark: #010807;
    --panel: rgba(0,18,14,0.92);
    --text: #cffff5;
}

body {
    min-height: 100vh;
    overflow: hidden;
    font-family: "Courier New", monospace;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(0,255,204,0.018) 0px,
            rgba(0,255,204,0.018) 1px,
            transparent 1px,
            transparent 12px
        ),
        #000201;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at center, rgba(0,255,204,0.02), transparent 75%);
    pointer-events: none;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.006),
        rgba(255,255,255,0.006) 1px,
        transparent 1px,
        transparent 5px
    );
    opacity: 0.35;
    mix-blend-mode: screen;
    pointer-events: none;
}

.wrapper {
    width: min(1100px, 90vw);
    padding: 1.25rem;
    position: relative;
}

.header {
    text-align: center;
    margin-bottom: 1.2rem;
}

.header h1 {
    font-family: "Courier New", monospace;
    font-size: clamp(1rem, 2.5vw, 2.2rem);
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--primary);
    text-shadow:
        0 0 4px rgba(0,255,204,0.55),
        0 0 10px rgba(0,255,204,0.18);
}

.machine-shell {
    border: 1px solid var(--primary);
    background: var(--panel);
    box-shadow:
        inset 0 0 10px rgba(0,255,204,0.08),
        0 0 14px rgba(0,255,204,0.06);
    border-radius: 0;
    padding: 1.3rem;
    position: relative;
}

.machine-shell::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px solid var(--primary-dim);
    pointer-events: none;
}

.machine {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
}

.slot {
    min-height: 170px;
    border: 1px solid rgba(0,255,204,0.35);
    border-radius: 0;
    background: rgba(0,8,6,0.97);
    box-shadow:
        inset 0 0 8px rgba(0,255,204,0.05);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
}

.slot::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(to bottom, transparent 0%, rgba(0,255,204,0.02) 50%, transparent 100%);
    pointer-events: none;
}

.slot.active {
    border-color: var(--primary);
    box-shadow:
        inset 0 0 14px rgba(0,255,204,0.12),
        0 0 10px rgba(0,255,204,0.12);
}

.slot.locked {
    border-color: var(--primary);
    box-shadow:
        inset 0 0 8px rgba(0,255,204,0.08);
}

.slot-word {
    font-size: 0.95rem;
    text-align: center;
    line-height: 1.35;
    font-weight: 700;
    padding: 0.8rem;
    text-transform: uppercase;
    color: var(--primary);
    text-shadow: 0 0 3px rgba(0,255,204,0.28);
}

.locked-indicator {
    position: absolute;
    bottom: 8px;
    right: 8px;
    font-size: 0.58rem;
    opacity: 0;
    color: var(--primary);
    letter-spacing: 0.12em;
}

.slot.locked .locked-indicator {
    opacity: 1;
}

.controls {
    margin-top: 1.4rem;
    display: flex;
    justify-content: center;
}

button {
    font-family: "Courier New", monospace;
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid var(--primary);
    border-radius: 0;
    padding: 0.8rem 2rem;
    cursor: pointer;
    color: var(--primary);
    background: rgba(0,8,6,0.96);
    box-shadow:
        inset 0 0 6px rgba(0,255,204,0.05),
        0 0 8px rgba(0,255,204,0.05);
    transition: 0.2s ease;
}

button:hover:not(:disabled) {
    background: rgba(0,255,204,0.04);
    box-shadow:
        inset 0 0 8px rgba(0,255,204,0.08),
        0 0 10px rgba(0,255,204,0.12);
}

button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
}

.output {
    margin-top: 1rem;
    padding: 0.9rem;
    border: 1px solid rgba(0,255,204,0.28);
    border-radius: 0;
    background: rgba(0,8,6,0.95);
    text-align: center;
    line-height: 1.45;
    min-height: 70px;
    font-size: 0.85rem;
    color: var(--primary);
    text-shadow: 0 0 3px rgba(0,255,204,0.22);
}

@media (max-width: 1100px) {
    .machine {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 700px) {
    .machine {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>Weird-of-Fortune</h1>
    </div>

    <div class="machine-shell">
        <div class="machine">
            <div class="slot" id="slot0">
                <div class="slot-word" id="word0">—</div>
                <div class="locked-indicator">LOCKED</div>
            </div>

            <div class="slot" id="slot1">
                <div class="slot-word" id="word1">—</div>
                <div class="locked-indicator">LOCKED</div>
            </div>

            <div class="slot" id="slot2">
                <div class="slot-word" id="word2">—</div>
                <div class="locked-indicator">LOCKED</div>
            </div>

            <div class="slot" id="slot3">
                <div class="slot-word" id="word3">—</div>
                <div class="locked-indicator">LOCKED</div>
            </div>
        </div>

        <div class="controls">
            <button id="chaosBtn">Spin That Wheel!</button>
        </div>
        
        <div class="output" id="finalOutput">
            So weird huh...
        </div>
    </div>
</div>

const banks = [a1, a2, a3, a4];
const button = document.getElementById("chaosBtn");
const output = document.getElementById("finalOutput");

function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

async function spinSlots() {
    button.disabled = true;
    output.textContent = "Yet it keeps getting weirder...";

    const chosen = [];

    for (let i = 0; i < 4; i++) {
        const slot = document.getElementById("slot" + i);
        slot.classList.remove("locked");
        slot.classList.add("active");
    }

    for (let i = 0; i < 4; i++) {
        const wordEl = document.getElementById("word" + i);
        const slotEl = document.getElementById("slot" + i);

        await new Promise(resolve => {
            const interval = setInterval(() => {
                wordEl.textContent = randomItem(banks[i]);
            }, 75);

            setTimeout(() => {
                clearInterval(interval);
                const finalChoice = randomItem(banks[i]);
                chosen.push(finalChoice);
                wordEl.textContent = finalChoice;

                slotEl.classList.remove("active");
                slotEl.classList.add("locked");
                resolve();
            }, 1600 + i * 900);
        });
    }

    output.innerHTML = "<strong>WEIRD GENERATED:</strong><br><br>" + chosen.join(" ");
    button.disabled = false;
}

button.addEventListener("click", spinSlots);
